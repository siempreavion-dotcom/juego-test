<!DOCTYPE html>
<html>
<head>
    <title>AXEL MINIGAME V2</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { border: 2px solid #0f0; background: #000; box-shadow: 0 0 15px #0f0; }
        #info { position: absolute; top: 10px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="info">PUNTOS: <span id="score">0</span> | SALTOS: <span id="jumps">2</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const jumpsElement = document.getElementById("jumps");

    canvas.width = 600;
    canvas.height = 250;

    let gameRunning = true;
    let score = 0;
    let player = { x: 50, y: 200, w: 30, h: 30, dy: 0, jumpForce: 10, jumps: 2 };
    let obstacle = { x: 600, y: 210, w: 25, h: 40, speed: 6 };
    let gravity = 0.5;

    function draw() {
        if (!gameRunning) return; // Si el juego se detiene, no hace nada más

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Suelo verde
        ctx.strokeStyle = "#0f0";
        ctx.strokeRect(0, 240, 600, 1);

        // Dibujar Jugador
        ctx.fillStyle = "#0f0";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Dibujar Obstáculo
        ctx.fillStyle = "#f00";
        ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

        // Física del salto
        player.dy += gravity;
        player.y += player.dy;

        if (player.y + player.h >= 240) {
            player.y = 240 - player.h;
            player.dy = 0;
            player.jumps = 2;
            jumpsElement.innerText = player.jumps;
        }

        // Movimiento obstáculo
        obstacle.x -= obstacle.speed;
        if (obstacle.x < -30) {
            obstacle.x = 600;
            score++;
            scoreElement.innerText = score;
            obstacle.speed += 0.2;
        }

        // COLISIÓN (Aquí es donde se detenía el alert)
        if (player.x < obstacle.x + obstacle.w && player.x + player.w > obstacle.x &&
            player.y < obstacle.y + obstacle.h && player.y + player.h > obstacle.y) {
            
            gameRunning = false; // Detenemos el bucle
            showGameOver();
        }

        requestAnimationFrame(draw);
    }

    function showGameOver() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#f00";
        ctx.font = "bold 40px monospace";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
        
        ctx.fillStyle = "#fff";
        ctx.font = "20px monospace";
        ctx.fillText("Presiona 'R' para reiniciar", canvas.width/2, canvas.height/2 + 40);
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && player.jumps > 0 && gameRunning) {
            player.dy = -player.jumpForce;
            player.jumps--;
            jumpsElement.innerText = player.jumps;
        }
        if (e.code === "KeyR" && !gameRunning) {
            location.reload(); // Reinicia la página dentro del exe
        }
    });

    draw();
</script>
</body>
</html>
