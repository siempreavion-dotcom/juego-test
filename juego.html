<!DOCTYPE html>
<html>
<head>
    <title>AXEL MINI GAME</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { border: 3px solid #0f0; box-shadow: 0 0 20px #0f0; background: #000; }
        #ui { position: absolute; top: 10px; font-size: 20px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span> | JUMPS: <span id="jumps">2</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const jumpsElement = document.getElementById("jumps");

    canvas.width = 600;
    canvas.height = 250;

    let gameRunning = true;
    let player = { x: 50, y: 200, w: 30, h: 30, dy: 0, jumpForce: 10, grounded: false, jumps: 2 };
    let gravity = 0.5;
    let obstacle = { x: 600, y: 210, w: 25, h: 40, speed: 6 };
    let score = 0;

    function draw() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Suelo
        ctx.strokeStyle = "#0f0";
        ctx.beginPath(); ctx.moveTo(0, 240); ctx.lineTo(600, 240); ctx.stroke();

        // Jugador (Con brillo)
        ctx.fillStyle = "#0f0";
        ctx.shadowBlur = 10; ctx.shadowColor = "#0f0";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;

        // Obstáculo (Rojo Neón)
        ctx.fillStyle = "#f00";
        ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

        // Física
        player.dy += gravity;
        player.y += player.dy;

        if (player.y + player.h >= 240) {
            player.y = 240 - player.h;
            player.dy = 0;
            player.grounded = true;
            player.jumps = 2; // Recarga saltos al tocar suelo
            jumpsElement.innerText = player.jumps;
        }

        // Movimiento
        obstacle.x -= obstacle.speed;
        if (obstacle.x < -30) {
            obstacle.x = 600;
            score++;
            scoreElement.innerText = score;
            obstacle.speed += 0.2;
        }

        // Colisión arreglada
        if (player.x < obstacle.x + obstacle.w && player.x + player.w > obstacle.x &&
            player.y < obstacle.y + obstacle.h && player.y + player.h > obstacle.y) {
            gameOver();
        }

        requestAnimationFrame(draw);
    }

    function gameOver() {
        gameRunning = false;
        // En lugar de alert, dibujamos el texto en el canvas
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "#f00";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 180, 120);
        ctx.font = "20px Arial";
        ctx.fillText("Presiona 'R' para reiniciar", 185, 160);
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && player.jumps > 0 && gameRunning) {
            player.dy = -player.jumpForce;
            player.jumps--;
            player.grounded = false;
            jumpsElement.innerText = player.jumps;
        }
        if (e.code === "KeyR" && !gameRunning) {
            location.reload(); // Reinicia el juego sin el bug del alert
        }
    });

    draw();
</script>
</body>
</html>
